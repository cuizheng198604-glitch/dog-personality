# Render 部署配置 - 狗品种性格测试

services:
  # ── 前端静态站 ──────────────────────────────
  - type: web
    name: dog-personality
    runtime: static
    buildCommand: ""
    staticPublishPath: public
    headers:
      - path: "/*"
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    envVars:
      - key: ADMIN_PASSWORD
        value: "dog-admin-2026"

  # ── 后端 API ──────────────────
  - type: web
    name: dog-api
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: ADMIN_PASSWORD
        value: "dog-admin-2026"
      - key: NODE_ENV
        value: production
